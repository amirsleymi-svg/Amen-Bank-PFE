spring:
  application:
    name: ${APP_NAME:Amen Bank}

  # ─── Datasource ──────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:amenbank}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: ${DB_USER:amenbank_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ─── JPA ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ─── Flyway ──────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ─── Redis ───────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ─── Mail ────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: "*"

  # ─── File Upload ─────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_SIZE_MB:10}MB
      max-request-size: ${UPLOAD_MAX_SIZE_MB:10}MB

# ─── Server ──────────────────────────────────────────────────────────
server:
  port: ${APP_PORT:8080}
  servlet:
    context-path: /api/v1
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
  http2:
    enabled: true
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

# ─── JWT ─────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  token-prefix: "Bearer "
  header-name: "Authorization"

# ─── TOTP ────────────────────────────────────────────────────────────
totp:
  issuer: ${TOTP_ISSUER:AmenBank}
  period: ${TOTP_PERIOD:30}
  digits: ${TOTP_DIGITS:6}

# ─── Application ─────────────────────────────────────────────────────
app:
  name: ${APP_NAME:Amen Bank}
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  admin-secret-key-hash: ${ADMIN_SECRET_KEY_HASH}
  upload-path: ${UPLOAD_PATH:/data/uploads}
  upload-allowed-types: ${UPLOAD_ALLOWED_TYPES:application/pdf,image/jpeg,image/png}
  mail-from: ${MAIL_FROM:noreply@amenbank.com}
  mail-from-name: ${MAIL_FROM_NAME:Amen Bank}
  max-login-attempts: ${MAX_LOGIN_ATTEMPTS:5}
  lockout-duration-minutes: ${LOCKOUT_DURATION_MINUTES:15}
  bcrypt-strength: ${BCRYPT_STRENGTH:12}

# ─── Actuator / Prometheus ───────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ─── Logging ─────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.amenbank: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{requestId}] %logger{36} - %msg%n"
  file:
    name: logs/amenbank.log
    max-size: 50MB
    max-history: 30

# ─── SpringDoc / OpenAPI ─────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  info:
    title: Amen Bank API
    version: 1.0.0
    description: Production-grade banking REST API
