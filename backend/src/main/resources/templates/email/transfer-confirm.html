<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org" lang="fr"><head><meta charset="UTF-8"/><style>body{margin:0;background:#F0F3F8;font-family:'Segoe UI',Arial,sans-serif}.wrapper{max-width:600px;margin:0 auto;padding:24px 16px}.card{background:#fff;border-radius:16px;border:1px solid #E2E8F2}.header{background:#0A3F6B;padding:28px 32px;text-align:center;border-radius:16px 16px 0 0}.logo{color:white;font-size:22px;font-weight:700}.body{padding:32px}.ib{background:#F4F8FD;border:1px solid #D8E6F5;border-radius:10px;padding:16px 20px;margin:16px 0}.ir{display:flex;justify-content:space-between;font-size:14px;padding:4px 0}.ik{color:#6B7A99}.iv{font-weight:600}.footer{padding:20px 32px;text-align:center;font-size:12px;color:#9BA8BC;border-top:1px solid #E2E8F2}</style></head>
<body><div class="wrapper"><div class="card">
<div class="header"><div class="logo">🏦 Amen Bank</div></div>
<div class="body">
<div style="background:#EDF9F3;border-radius:12px;padding:20px;text-align:center;margin-bottom:20px">
<div style="font-size:36px;font-weight:800;color:#1B7A4E" th:text="${amount + ' ' + currency}"></div>
<div style="font-size:14px;color:#1B7A4E;margin-top:4px">Virement effectué avec succès ✓</div>
</div>
<p style="font-size:15px;color:#4A5568">Bonjour <strong th:text="${name}"></strong>, votre virement a été traité.</p>
<div class="ib">
<div class="ir"><span class="ik">Référence</span><span class="iv" th:text="${ref}"></span></div>
<div class="ir"><span class="ik">Montant</span><span class="iv" style="color:#0A3F6B;font-size:16px" th:text="${amount + ' ' + currency}"></span></div>
</div>
<p style="font-size:13px;color:#9BA8BC">Si vous n'avez pas effectué cette opération, contactez immédiatement notre support au +216 71 XXX XXX.</p>
</div>
<div class="footer">© 2024 Amen Bank</div>
</div></div></body></html>
