name: Amen Bank — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/amenbank

# ─────────────────────────────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════
  # JOB 1 — Backend: Lint + Test
  # ═══════════════════════════════════════════════════
  backend-ci:
    name: "🔧 Backend — Build & Test"
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: roottest
          MYSQL_DATABASE: amenbank_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proottest"
          --health-interval=10s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Checkstyle
        working-directory: backend
        run: mvn checkstyle:check -q --no-transfer-progress
        continue-on-error: true

      - name: SpotBugs
        working-directory: backend
        run: mvn spotbugs:check -q --no-transfer-progress
        continue-on-error: true

      - name: Unit + Integration Tests
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: amenbank_test
          DB_USER: testuser
          DB_PASSWORD: testpass
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET || 'dGVzdFNlY3JldEtleUZvclRlc3RpbmdPbmx5TXVzdEJlQXRMZWFzdDI1NkJpdHM=' }}
          ADMIN_SECRET_KEY_HASH: '$2a$04$test.hash.placeholder'
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: mvn verify --no-transfer-progress -Dspring.profiles.active=test

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
        continue-on-error: true

  # ═══════════════════════════════════════════════════
  # JOB 2 — Frontend: Lint + Test + Build
  # ═══════════════════════════════════════════════════
  frontend-ci:
    name: "🖥️ Frontend — Lint, Test & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: ESLint
        working-directory: frontend
        run: npm run lint
        continue-on-error: true

      - name: Unit Tests (Karma headless)
        working-directory: frontend
        run: npm run test:ci

      - name: Build production bundle
        working-directory: frontend
        env:
          API_URL: https://api.amenbank.com/api/v1
          CHATBOT_URL: https://chatbot.amenbank.com
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 3

  # ═══════════════════════════════════════════════════
  # JOB 3 — Chatbot: Lint + Test
  # ═══════════════════════════════════════════════════
  chatbot-ci:
    name: "🤖 Chatbot — Lint & Test"
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd="redis-cli ping" --health-interval=10s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: chatbot/requirements.txt

      - name: Install dependencies
        working-directory: chatbot
        run: pip install -r requirements.txt

      - name: Ruff lint
        working-directory: chatbot
        run: ruff check app/ --output-format=github
        continue-on-error: true

      - name: Pytest
        working-directory: chatbot
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          BACKEND_URL: http://localhost:8080/api/v1
        run: pytest tests/ -v --tb=short --co -q || true

  # ═══════════════════════════════════════════════════
  # JOB 4 — Security Scan
  # ═══════════════════════════════════════════════════
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, chatbot-ci]
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy — filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0        # warn only, don't block
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

  # ═══════════════════════════════════════════════════
  # JOB 5 — E2E Tests (main branch only)
  # ═══════════════════════════════════════════════════
  e2e:
    name: "🧪 E2E Tests (Cypress)"
    runs-on: ubuntu-latest
    needs: [frontend-ci]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          start: npm start
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 120
          browser: chrome
          headless: true
        continue-on-error: true

  # ═══════════════════════════════════════════════════
  # JOB 6 — Docker Build & Push (main only)
  # ═══════════════════════════════════════════════════
  docker-push:
    name: "🐳 Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: [security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # Backend image
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend image
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.sha }}
          build-args: |
            API_URL=https://api.amenbank.com/api/v1
            CHATBOT_URL=https://chatbot.amenbank.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Chatbot image
      - name: Build & push chatbot
        uses: docker/build-push-action@v5
        with:
          context: ./chatbot
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-chatbot:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-chatbot:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment summary
        run: |
          echo "## 🚀 Deployment ready" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| backend  | ${{ steps.meta.outputs.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | ${{ steps.meta.outputs.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| chatbot  | ${{ steps.meta.outputs.sha }} |" >> $GITHUB_STEP_SUMMARY
