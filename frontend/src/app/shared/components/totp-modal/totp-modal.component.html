<!-- totp-modal.component.html -->
<div class="modal-backdrop" *ngIf="visible" (click)="onBackdropClick($event)">
  <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="totp-title">

    <!-- ── Header ─────────────────────────────────────────────── -->
    <div class="modal-header">
      <div class="modal-shield">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
                fill="rgba(10,63,107,0.10)"
                stroke="#0A3F6B" stroke-width="1.75" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke="#0A3F6B" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <button class="btn-close-modal" (click)="cancel()" aria-label="Fermer" [disabled]="loading">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor"
                stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- ── Title ──────────────────────────────────────────────── -->
    <div class="modal-title-block">
      <h3 id="totp-title">Confirmation de sécurité</h3>
      <p>Ouvrez <strong>Google Authenticator</strong> et entrez le code
         à 6 chiffres pour <strong>Amen Bank</strong></p>
    </div>

    <!-- ── Operation summary ──────────────────────────────────── -->
    <div class="op-summary" *ngIf="summary.length">
      <div class="op-row" *ngFor="let item of summary">
        <span class="op-label">{{ item.label }}</span>
        <span class="op-value" [class.op-highlight]="item.highlight">{{ item.value }}</span>
      </div>
    </div>

    <!-- ── Error banner ────────────────────────────────────────── -->
    <div class="totp-error-banner" *ngIf="error" role="alert">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 5v3M8 11v.3" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      {{ error }}
    </div>

    <!-- ── 6 digit boxes ──────────────────────────────────────── -->
    <div class="digit-row" [class.shake]="shaking">
      <input
        *ngFor="let _ of [0,1,2,3,4,5]; let i = index"
        #digit
        type="text"
        inputmode="numeric"
        maxlength="1"
        pattern="[0-9]"
        autocomplete="one-time-code"
        class="digit-box"
        [class.filled]="digits[i]"
        [class.errored]="error"
        [value]="digits[i]"
        (input)="onInput($event, i)"
        (keydown)="onKeydown($event, i)"
        (paste)="onPaste($event)"
        (focus)="onFocus(i)"
      />
    </div>

    <!-- ── Timer ──────────────────────────────────────────────── -->
    <div class="timer-row">
      <svg class="timer-svg" viewBox="0 0 36 36" width="32" height="32">
        <circle cx="18" cy="18" r="14" fill="none"
                stroke="#E2E8F2" stroke-width="3"/>
        <circle cx="18" cy="18" r="14" fill="none"
                [attr.stroke]="timerSecs <= 8 ? '#C5372A' : '#0A3F6B'"
                stroke-width="3"
                stroke-linecap="round"
                stroke-dasharray="87.96 87.96"
                [attr.stroke-dashoffset]="timerSecs / 30 * 87.96"
                transform="rotate(-90 18 18)"
                style="transition: stroke-dashoffset 0.9s linear, stroke 0.3s"/>
      </svg>
      <span class="timer-label" [class.expiring]="timerSecs <= 8">
        Code valide {{ timerSecs }}s
      </span>
    </div>

    <!-- ── Hint ───────────────────────────────────────────────── -->
    <p class="totp-hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 8v4M12 16h.01" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Le code se renouvelle automatiquement toutes les 30 secondes
    </p>

    <!-- ── Footer ─────────────────────────────────────────────── -->
    <div class="modal-footer">
      <button class="btn-cancel-modal" (click)="cancel()" [disabled]="loading">
        Annuler
      </button>
      <button class="btn-confirm-modal"
              (click)="confirm()"
              [disabled]="code.length < 6 || loading">
        <span class="spinner-sm" *ngIf="loading"></span>
        <span>{{ loading ? 'Vérification…' : 'Confirmer' }}</span>
        <svg *ngIf="!loading" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M12 5l7 7-7 7" stroke="white"
                stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

  </div>
</div>
