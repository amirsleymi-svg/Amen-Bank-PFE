name: Amen Bank CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/amenbank

jobs:

  # ─── Backend: lint + test ────────────────────────────────────────
  backend-ci:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: amenbank_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        working-directory: backend
        run: mvn checkstyle:check -q

      - name: Run SpotBugs
        working-directory: backend
        run: mvn spotbugs:check -q

      - name: Run Tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: amenbank_test
          DB_USER: testuser
          DB_PASSWORD: testpass
          JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
          ADMIN_SECRET_KEY_HASH: ${{ secrets.TEST_ADMIN_HASH }}
        run: mvn verify -P test --no-transfer-progress

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        with:
          file: backend/target/site/jacoco/jacoco.xml

  # ─── Frontend: lint + test ───────────────────────────────────────
  frontend-ci:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Unit tests
        working-directory: frontend
        run: npm run test:ci

      - name: Build production
        working-directory: frontend
        env:
          API_URL: https://api.amenbank.com/api/v1
          CHATBOT_URL: https://chatbot.amenbank.com
        run: npm run build

  # ─── Chatbot: lint + test ────────────────────────────────────────
  chatbot-ci:
    name: Chatbot — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: chatbot/requirements.txt

      - name: Install dependencies
        working-directory: chatbot
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        working-directory: chatbot
        run: ruff check app tests

      - name: Run Tests
        working-directory: chatbot
        run: pytest tests/ -v --tb=short

  # ─── Security scan ───────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, chatbot-ci]

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'amenbank'
          path: 'backend'
          format: 'HTML'

  # ─── Build & push Docker images (main branch only) ───────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest,${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
          build-args: |
            API_URL=https://api.amenbank.com/api/v1
            CHATBOT_URL=https://chatbot.amenbank.com
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push chatbot
        uses: docker/build-push-action@v5
        with:
          context: ./chatbot
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-chatbot:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
