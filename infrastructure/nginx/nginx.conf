worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 15M;

    # ─── Security headers ───────────────────────────────────────────
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"
      always;

    server_tokens off;

    # ─── Rate limiting zones ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_zone:10m     rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=chatbot_zone:10m rate=20r/m;

    # ─── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ─── Upstream backends ─────────────────────────────────────────
    upstream backend  { server backend:8080;  }
    upstream chatbot  { server chatbot:8000;  }
    upstream frontend { server frontend:80;   }

    # ─── HTTP → HTTPS redirect ──────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── Main HTTPS server ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name amenbank.local;

        ssl_certificate     /etc/nginx/ssl/amenbank.crt;
        ssl_certificate_key /etc/nginx/ssl/amenbank.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Angular SPA ───────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Spring Boot API ───────────────────────────────────────
        location /api/v1/ {
            limit_req zone=api_zone burst=15 nodelay;

            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Auth endpoints — stricter rate limit ──────────────────
        location /api/v1/auth/login {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Chatbot ───────────────────────────────────────────────
        location /chatbot/ {
            limit_req zone=chatbot_zone burst=10 nodelay;

            rewrite ^/chatbot/(.*) /$1 break;
            proxy_pass         http://chatbot;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }

        # ── Swagger UI ────────────────────────────────────────────
        location /api/v1/swagger-ui/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Actuator — restrict to monitoring networks ─────────────
        location /api/v1/actuator {
            allow 172.0.0.0/8;
            deny  all;
            proxy_pass http://backend;
        }

        # ── Block hidden files ─────────────────────────────────────
        location ~ /\. { deny all; return 404; }
    }
}
